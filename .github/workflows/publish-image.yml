name: Publish Docker Image

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'image/**'
      - 'packages/agent-env/src/**'
      - 'packages/agent-env/bin/**'
      - 'packages/agent-env/package.json'
      - '.github/workflows/publish-image.yml'
  workflow_dispatch:

# Queue concurrent image builds — never cancel a running publish
concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/devcontainer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2

      - name: Detect agent-env version change
        id: agent-env-version
        run: |
          CURRENT=$(jq -r .version packages/agent-env/package.json)
          PREVIOUS=$(git show HEAD~1:packages/agent-env/package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "changed=$( [ "$CURRENT" != "$PREVIOUS" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "Agent-env version: $CURRENT (changed: $( [ "$CURRENT" != "$PREVIOUS" ] && echo true || echo false ))"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies and build agent-env
        run: pnpm install --frozen-lockfile && pnpm --filter @zookanalytics/agent-env build

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value=${{ steps.agent-env-version.outputs.version }},enable=${{ steps.agent-env-version.outputs.changed }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          file: image/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TZ=Etc/UTC
            GIT_DELTA_VERSION=0.18.2
            ZSH_IN_DOCKER_VERSION=1.2.1
            PNPM_VERSION=10.30.1
