name: Publish Docker Image

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - 'image/**'
      - 'packages/agent-env/src/**'
      - 'packages/agent-env/bin/**'
      - 'packages/agent-env/config/**'
      - 'packages/agent-env/package.json'
      - '.github/workflows/publish-image.yml'
  workflow_dispatch:

# Queue concurrent image builds — never cancel a running publish
concurrency:
  group: publish-image
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/devcontainer
  TZ: Etc/UTC
  GIT_DELTA_VERSION: 0.18.2
  ZSH_IN_DOCKER_VERSION: 1.2.1
  PNPM_VERSION: 10.30.1

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      agent-env-version: ${{ steps.agent-env-version.outputs.version }}
      agent-env-changed: ${{ steps.agent-env-version.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 2

      - name: Detect agent-env version change
        id: agent-env-version
        run: |
          CURRENT=$(jq -r .version packages/agent-env/package.json)
          PREVIOUS=$(git show HEAD~1:packages/agent-env/package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "changed=$( [ "$CURRENT" != "$PREVIOUS" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "Agent-env version: $CURRENT (changed: $( [ "$CURRENT" != "$PREVIOUS" ] && echo true || echo false ))"

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies and build agent-env
        run: pnpm install --frozen-lockfile && pnpm --filter @zookanalytics/agent-env... build

      - name: Upload agent-env build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: agent-env-build
          path: |
            packages/agent-env/dist/
            packages/agent-env/bin/
            packages/agent-env/package.json

  build-amd64:
    runs-on: ubuntu-latest
    needs: prep
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download agent-env build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: agent-env-build
          path: packages/agent-env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels only)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push amd64 image
        env:
          BUILD_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          LABEL_ARGS=()
          while IFS= read -r label; do
            [ -n "$label" ] && LABEL_ARGS+=(--label "$label")
          done <<< "$BUILD_LABELS"
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha,scope=buildx-amd64 \
            --cache-to type=gha,scope=buildx-amd64,mode=max \
            --build-arg "TZ=$TZ" \
            --build-arg "GIT_DELTA_VERSION=$GIT_DELTA_VERSION" \
            --build-arg "ZSH_IN_DOCKER_VERSION=$ZSH_IN_DOCKER_VERSION" \
            --build-arg "PNPM_VERSION=$PNPM_VERSION" \
            "${LABEL_ARGS[@]}" \
            --tag "$REGISTRY/$IMAGE_NAME:sha-${SHORT_SHA}-amd64" \
            --push \
            --file image/Dockerfile \
            .

  build-arm64:
    runs-on: ubuntu-24.04-arm
    needs: prep
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download agent-env build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: agent-env-build
          path: packages/agent-env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels only)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push arm64 image
        env:
          BUILD_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          LABEL_ARGS=()
          while IFS= read -r label; do
            [ -n "$label" ] && LABEL_ARGS+=(--label "$label")
          done <<< "$BUILD_LABELS"
          docker buildx build \
            --platform linux/arm64 \
            --cache-from type=gha,scope=buildx-arm64 \
            --cache-to type=gha,scope=buildx-arm64,mode=max \
            --build-arg "TZ=$TZ" \
            --build-arg "GIT_DELTA_VERSION=$GIT_DELTA_VERSION" \
            --build-arg "ZSH_IN_DOCKER_VERSION=$ZSH_IN_DOCKER_VERSION" \
            --build-arg "PNPM_VERSION=$PNPM_VERSION" \
            "${LABEL_ARGS[@]}" \
            --tag "$REGISTRY/$IMAGE_NAME:sha-${SHORT_SHA}-arm64" \
            --push \
            --file image/Dockerfile \
            .

  merge:
    runs-on: ubuntu-latest
    needs: [prep, build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value=${{ needs.prep.outputs.agent-env-version }},enable=${{ needs.prep.outputs.agent-env-changed }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Create and push multi-arch manifest
        env:
          MANIFEST_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAG_ARGS=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAG_ARGS+=(--tag "$tag")
          done <<< "$MANIFEST_TAGS"
          docker buildx imagetools create \
            "${TAG_ARGS[@]}" \
            "$REGISTRY/$IMAGE_NAME:sha-${SHORT_SHA}-amd64" \
            "$REGISTRY/$IMAGE_NAME:sha-${SHORT_SHA}-arm64"
